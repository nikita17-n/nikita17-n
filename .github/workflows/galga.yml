name: Generate Galaga Contribution Graph

on:
workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generate Graph
    uses: yoshi389111/github-profile-3d-contrib@0.7.1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      USERNAME: nikita17-n

  - name: Show Generated Files
    run: |
      pwd
      find . -type f | sort
      ls -la
      ls -la dist || true
      ls -la output || true
      ls -la svg || true
```
