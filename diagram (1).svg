<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" height="420" width="1200">
  <defs>
    <linearGradient y2="100%" x2="100%" y1="0%" x1="0%" id="bg">
      <stop stop-color="#0b0006" offset="0%"></stop>
      <stop stop-color="#0a0a0a" offset="55%"></stop>
      <stop stop-color="#0b0006" offset="100%"></stop>
    </linearGradient>
    <radialGradient r="60%" cy="20%" cx="15%" id="glow">
      <stop stop-opacity="0.16" stop-color="#ff1e3c" offset="0%"></stop>
      <stop stop-opacity="0" stop-color="#ff1e3c" offset="100%"></stop>
    </radialGradient>
    <radialGradient r="55%" cy="100%" cx="95%" id="glow2">
      <stop stop-opacity="0.12" stop-color="#ff1e3c" offset="0%"></stop>
      <stop stop-opacity="0" stop-color="#ff1e3c" offset="100%"></stop>
    </radialGradient>

    
    <linearGradient y2="100%" x2="0%" y1="0%" x1="0%" id="scanGradient">
      <stop stop-opacity="0" stop-color="#ff1e3c" offset="0%"></stop>
      <stop stop-opacity="0.9" stop-color="#ff1e3c" offset="45%"></stop>
      <stop stop-opacity="0.9" stop-color="#ff1e3c" offset="55%"></stop>
      <stop stop-opacity="0" stop-color="#ff1e3c" offset="100%"></stop>
    </linearGradient>

    <style>
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      
      @keyframes pulseLines {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      @keyframes nodePulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      
      @keyframes scan {
        0% { transform: translateY(-100px); }
        100% { transform: translateY(520px); }
      }
      
      .bg-glow {
        animation: pulseGlow 8s ease-in-out infinite;
      }
      
      .tech-lines {
        animation: pulseLines 6s ease-in-out infinite;
      }
      
      .node-group {
        animation: nodePulse 3s ease-in-out infinite;
      }
      
      .main-text {
        animation: pulseGlow 4s ease-in-out infinite;
      }
      
      .border {
        animation: pulseGlow 5s ease-in-out infinite;
      }
      
      .scan-line {
        animation: scan 4.5s linear infinite;
      }
    </style>
  </defs>

  <rect fill="url(#bg)" height="420" width="1200"></rect>
  <rect class="bg-glow" fill="url(#glow)" height="420" width="1200"></rect>
  <rect class="bg-glow" fill="url(#glow2)" height="420" width="1200"></rect>

  
